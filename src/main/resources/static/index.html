<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>合同模板工作台</title><link rel="stylesheet" href="/workbench.css"></head><body>
<main><h1>合同模板工作台</h1><p class="hint">上传或选择 HTML 模板，填写测试数据，一键预览 HTML 和 PDF。</p>
<section class="card form"><label>模板项目名称<input id="projectName" value="租赁协议"></label><label>HTML 模板<input id="template" type="file" accept=".html,.htm"></label><label>JSON 数据（可选）<input id="dataFile" type="file" accept=".json"></label><label>参数数据<textarea id="dataText" spellcheck="false" placeholder="没有填写时，工具会自动生成参数骨架"></textarea></label><button id="render">生成预览</button><span id="status"></span></section>
<section class="grid"><div class="card"><h2>字段报告</h2><div id="report">尚未生成</div></div><div class="card"><h2>渲染 HTML</h2><iframe id="htmlPreview"></iframe></div><div class="card"><h2>PDF 预览</h2><iframe id="pdfPreview"></iframe></div></section></main><script src="/workbench.js"></script></body></html>
