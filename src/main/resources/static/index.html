<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>合同模板工作台</title><link rel="stylesheet" href="/workbench.css"></head>
<body>
<header class="topbar"><div><h1>合同模板工作台</h1><p>HTML 模板校验 · 参数编辑 · PDF 预览</p></div><span id="status" class="status">准备就绪</span></header>
<main>
  <section class="step-card"><div class="step-title"><b>1</b><div><h2>选择模板来源</h2><p>上传已经准备好的 HTML 模板，或打开已保存的模板项目。</p></div></div><div class="source-grid"><label class="field">已保存模板<select id="projects"><option value="">选择模板项目</option></select></label><label class="field">项目名称<input id="projectName" value="租赁协议"></label><label class="field wide">HTML 模板文件<input id="template" type="file" accept=".html,.htm"></label></div></section>
  <section class="step-card"><div class="step-title"><b>2</b><div><h2>编辑 HTML 模板</h2><p>在这里补充或调整 FreeMarker 参数和 HTML 布局。</p></div></div><textarea id="templateText" class="editor" spellcheck="false" placeholder="上传 HTML 后，模板源码会显示在这里"></textarea><div class="actions"><button id="analyze">检查普通模板</button><button id="analyzeLayout">检查固定布局</button><button id="downloadHtml" class="ghost">下载 HTML</button></div></section>
  <section class="step-card"><div class="step-title"><b>3</b><div><h2>填写测试数据</h2><p>用于本次 HTML/PDF 预览，不会自动替你决定业务参数。</p></div></div><div class="data-grid"><label class="field">JSON 测试数据 <button id="chooseData" class="secondary">导入 JSON 文件</button><textarea id="dataText" class="json-editor" spellcheck="false" placeholder="留空时自动生成参数骨架"></textarea></label><label class="field">固定布局配置<textarea id="layoutText" class="json-editor" spellcheck="false" placeholder="三栏模板可调整 layout.json"></textarea></label></div><input id="dataFile" type="file" accept=".json" hidden></section>
  <section class="step-card output-card"><div class="step-title"><b>4</b><div><h2>生成与查看结果</h2><p>先生成 HTML/PDF，再根据报告继续调整模板。</p></div></div><div class="actions primary-actions"><button id="render">生成 HTML / PDF</button><button id="downloadLayout" class="ghost">下载布局 JSON</button></div><div class="report" id="report">分析报告会显示在这里</div><div class="preview-grid"><div><h3>HTML 预览</h3><iframe id="htmlPreview"></iframe></div><div><h3>PDF 预览</h3><iframe id="pdfPreview"></iframe></div></div></section>
</main><script src="/workbench.js"></script></body></html>
